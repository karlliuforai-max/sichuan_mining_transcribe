regex_replacements:
  - pattern: '(?P<num>[0-9零一二三四五六七八九十百千万两点\.]+)人(?=(?:左右|多|出来|拉|堆|矿|，|。|\s|$))'
    replacement: '\g<num>吨'
    status: candidate
    note: 矿石数量语境中“人”常为“吨”，必须复核
  - pattern: '(?P<num>[0-9]+(?:\.[0-9]+)?)的频率'
    replacement: '\g<num>的品位'
    status: candidate
    note: 数字检测语境中的频率常为品位


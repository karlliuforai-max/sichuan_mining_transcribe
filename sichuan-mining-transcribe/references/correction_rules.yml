strong_replacements:
  - wrong: 品味
    correct: 品位
    status: confirmed
    note: 矿业语境中通常为品位
  - wrong: 频率
    correct: 品位
    status: candidate
    note: 锂矿报价和检测语境中常误识为频率，需结合上下文复核
